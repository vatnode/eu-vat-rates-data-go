name: Update EU VAT Rates

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (show diff without publishing)'
        type: boolean
        default: false

jobs:
  update:
    name: Fetch, tag & release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download latest VAT rates
        run: |
          curl -sf https://raw.githubusercontent.com/vatnode/eu-vat-rates-data-js/main/data/eu-vat-rates-data.json \
            -o /tmp/latest.json

      - name: Check for rate changes
        id: diff
        run: |
          CURRENT=$(python3 -c "import json,sys; print(json.dumps(json.load(open(sys.argv[1]))['rates'],sort_keys=True))" eu-vat-rates-data.json)
          LATEST=$(python3 -c "import json,sys; print(json.dumps(json.load(open(sys.argv[1]))['rates'],sort_keys=True))" /tmp/latest.json)
          if [ "$CURRENT" = "$LATEST" ]; then
            echo "rates_changed=false" >> "$GITHUB_OUTPUT"
            echo "No rate changes."
          else
            echo "rates_changed=true" >> "$GITHUB_OUTPUT"
            echo "Rate changes detected."
          fi

      - name: Update embedded data
        if: steps.diff.outputs.rates_changed == 'true'
        run: cp /tmp/latest.json eu-vat-rates-data.json

      - name: Set up Go
        if: steps.diff.outputs.rates_changed == 'true' && github.event.inputs.dry_run != 'true'
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build check
        if: steps.diff.outputs.rates_changed == 'true' && github.event.inputs.dry_run != 'true'
        run: go build ./...

      - name: Commit, tag and push
        if: steps.diff.outputs.rates_changed == 'true' && github.event.inputs.dry_run != 'true'
        run: |
          DATE=$(date -u +%Y-%m-%d)
          # Go modules require v1.x.x (major >= 2 needs /vN path suffix)
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v1.0.0")
          PATCH=$(echo "$LATEST_TAG" | cut -d. -f3)
          VERSION="v1.0.$((PATCH + 1))"
          git config user.name "vatnode-bot"
          git config user.email "bot@vatnode.dev"
          git add eu-vat-rates-data.json
          git commit -m "chore: update VAT rates ${DATE} (${VERSION})"
          git tag "$VERSION"
          git push && git push --tags
